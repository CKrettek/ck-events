<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CK Events — Admin</title>
<style>
:root{--navy:#08245b;--orange:#f45117;--cream:#fff8ee;--paper:#eee7dc;--line:#e1d7c9;--green:#0a7a43;--red:#9a1d1d}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--navy);font-family:Arial,Helvetica,sans-serif}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.loginbox{width:min(100%,420px);background:var(--cream);border-radius:22px;padding:34px;box-shadow:0 14px 45px rgba(0,0,0,.15);text-align:center}
.loginbox h1,h1{font-family:Georgia,'Times New Roman',serif;font-weight:400;margin:0}
.loginbox h1{font-size:44px}
.loginbox input{width:100%;border:1px solid #d7c9ba;border-radius:10px;padding:14px;font-size:18px;margin:14px 0}
button,a.button{border:0;border-radius:10px;background:var(--navy);color:white;padding:12px 16px;font-weight:900;text-decoration:none;cursor:pointer;display:inline-block}
button.secondary{background:var(--orange)}
.wrap{display:none;max-width:1200px;margin:0 auto;padding:34px 22px}
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:22px}
h1{font-size:48px}
.sub{margin:8px 0 0;font-size:16px;opacity:.8}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin:20px 0}
.card{background:var(--cream);border-radius:16px;padding:22px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.num{font-size:38px;font-weight:900}
.label{font-size:12px;font-weight:900;letter-spacing:.1em;margin-top:6px}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}
.controls input,.controls select{border:1px solid #d7c9ba;border-radius:10px;padding:12px;font-size:15px;background:white;color:var(--navy)}
.controls input{min-width:260px;flex:1}
.panel{background:var(--cream);border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:13px 14px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:top}
th{font-size:12px;letter-spacing:.08em;text-transform:uppercase;background:#fbf3e8;white-space:nowrap}
.badge{display:inline-block;border-radius:999px;padding:5px 10px;font-weight:900;font-size:12px}
.badge.attending{background:#dff4e8;color:var(--green)}
.badge.declined{background:#f8dddd;color:var(--red)}
.notice{background:#fff4d8;border:1px solid #efd28a;border-radius:12px;padding:14px;margin:14px 0;display:none}
.email{color:var(--navy)}
.small{font-size:12px;opacity:.75;margin-top:12px}
@media(max-width:900px){.header{display:block}.cards{grid-template-columns:repeat(2,1fr)}h1{font-size:40px}}
@media(max-width:650px){.cards{grid-template-columns:1fr}.controls input,.controls select{width:100%;min-width:0}th,td{padding:10px 8px;font-size:13px}}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="loginbox">
    <h1>CK Events</h1>
    <p>Admin dashboard</p>
    <input id="password" type="password" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Open Dashboard</button>
    <p class="small">Temporary protection for Phase 2.</p>
  </div>
</div>

<div class="wrap" id="dashboard">
  <div class="header">
    <div>
      <h1>CK Events</h1>
      <p class="sub">Admin dashboard · Another Birthday — by Christian</p>
    </div>
    <div class="actions">
      <button onclick="loadData()">Refresh</button>
      <button class="secondary" onclick="downloadCSV()">Export CSV</button>
      <a class="button" href="./index.html">Invitation</a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div id="notice" class="notice"></div>

  <div class="cards">
    <div class="card"><div class="num" id="total">–</div><div class="label">TOTAL RSVPS</div></div>
    <div class="card"><div class="num" id="attending">–</div><div class="label">ATTENDING</div></div>
    <div class="card"><div class="num" id="declined">–</div><div class="label">DECLINED</div></div>
    <div class="card"><div class="num" id="guests">–</div><div class="label">TOTAL GUESTS</div></div>
    <div class="card"><div class="num" id="dietary">–</div><div class="label">DIETARY NOTES</div></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search name or email…" oninput="renderRows()">
    <select id="filter" onchange="renderRows()">
      <option value="all">All RSVPs</option>
      <option value="attending">Attending only</option>
      <option value="declined">Declined only</option>
    </select>
    <select id="sort" onchange="renderRows()">
      <option value="date_desc">Newest first</option>
      <option value="date_asc">Oldest first</option>
      <option value="name_asc">Name A–Z</option>
      <option value="guests_desc">Guests high–low</option>
    </select>
  </div>

  <div class="panel">
    <table>
      <thead>
        <tr>
          <th>Last update</th><th>Name</th><th>Email</th><th>Status</th><th>Guests</th><th>Dietary / comments</th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td colspan="6">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ubeaqemmnibtfichxhwt.supabase.co";
const SUPABASE_KEY = "sb_publishable_UtDDKiR6cRZ24Gon_iu8hg_TxhX_zXX";
const ADMIN_PASSWORD = "Christian2026";
const EVENT_SLUG = "christian-birthday-2026";
let currentRows = [];

function login(){
  const pw = document.getElementById('password').value;
  if(pw === ADMIN_PASSWORD){
    sessionStorage.setItem('ck_admin','yes');
    document.getElementById('login').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadData();
  } else alert('Wrong password');
}

function logout(){
  sessionStorage.removeItem('ck_admin');
  location.reload();
}

if(sessionStorage.getItem('ck_admin') === 'yes'){
  document.getElementById('login').style.display='none';
  document.getElementById('dashboard').style.display='block';
  loadData();
}

function showNotice(text){
  const n=document.getElementById('notice');
  n.textContent=text;
  n.style.display='block';
}

function fmtTime(s){
  return s ? new Date(s).toLocaleString() : "";
}

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

async function loadData(){
  document.getElementById('rows').innerHTML='<tr><td colspan="6">Loading…</td></tr>';
  document.getElementById('notice').style.display='none';

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rsvps?select=*&event_slug=eq.${EVENT_SLUG}&order=created_at.desc`, {
      headers: {"apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`}
    });

    if(!res.ok) throw new Error(await res.text());
    currentRows = await res.json();
    updateCards();
    renderRows();

  } catch(e) {
    document.getElementById('rows').innerHTML='<tr><td colspan="6">Could not load RSVPs.</td></tr>';
    showNotice('Could not load data. Check Supabase SELECT policy.');
    console.error(e);
  }
}

function updateCards(){
  const attendingRows = currentRows.filter(r => r.status === 'attending');
  const declinedRows = currentRows.filter(r => r.status === 'declined');

  document.getElementById('total').textContent = currentRows.length;
  document.getElementById('attending').textContent = attendingRows.length;
  document.getElementById('declined').textContent = declinedRows.length;
  document.getElementById('guests').textContent = attendingRows.reduce((sum,r)=>sum+(parseInt(r.guest_count||1,10)||1),0);
  document.getElementById('dietary').textContent = currentRows.filter(r => r.dietary_requirements && r.dietary_requirements.trim() !== '').length;
}

function getVisibleRows(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filter = document.getElementById('filter').value;
  const sort = document.getElementById('sort').value;

  let rows = [...currentRows];

  if(filter !== 'all') rows = rows.filter(r => r.status === filter);

  if(q){
    rows = rows.filter(r =>
      String(r.name || '').toLowerCase().includes(q) ||
      String(r.email || '').toLowerCase().includes(q)
    );
  }

  rows.sort((a,b)=>{
    if(sort === 'date_asc') return new Date(a.created_at) - new Date(b.created_at);
    if(sort === 'name_asc') return String(a.name||'').localeCompare(String(b.name||''));
    if(sort === 'guests_desc') return (parseInt(b.guest_count||1,10)||1) - (parseInt(a.guest_count||1,10)||1);
    return new Date(b.created_at) - new Date(a.created_at);
  });

  return rows;
}

function renderRows(){
  const rows = getVisibleRows();

  const html = rows.map(r => {
    const status = r.status === 'attending' ? 'attending' : 'declined';
    const statusText = status === 'attending' ? '✓ Attending' : '× Declined';
    const guests = status === 'attending' ? (r.guest_count || 1) : '';
    const email = r.email ? `<a class="email" href="mailto:${escapeHtml(r.email)}">${escapeHtml(r.email)}</a>` : '';

    return `<tr>
      <td>${fmtTime(r.updated_at || r.created_at)}</td>
      <td><strong>${escapeHtml(r.name)}</strong></td>
      <td>${email}</td>
      <td><span class="badge ${status}">${statusText}</span></td>
      <td>${guests}</td>
      <td>${escapeHtml(r.dietary_requirements || '')}</td>
    </tr>`;
  }).join('');

  document.getElementById('rows').innerHTML = html || '<tr><td colspan="6">No matching RSVPs.</td></tr>';
}

function downloadCSV(){
  const headers = ['created_at','name','email','status','guest_count','dietary_requirements'];
  const rows = getVisibleRows();

  const csvRows = [headers.join(';')];

  rows.forEach(r => {
    csvRows.push(headers.map(h => {
      let value = r[h] ?? '';
      value = String(value).replace(/"/g,'""');
      return `"${value}"`;
    }).join(';'));
  });

  const csv = '\ufeff' + csvRows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ck-events-rsvps.csv';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
